
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>قص الصور وتغيير أبعادها | WebBag</title>

  <meta name="description" content="أداة مجانية لقص الصور وتغيير أبعادها أونلاين. تدعم JPG وPNG وWEBP وHEIC وغيرها من الصيغ مباشرة من المتصفح.">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">

  <script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>

  <style>
    body{
      margin:0;
      padding:20px;
      background:#f5f7fb;
      font-family:Tahoma,Arial,sans-serif;
      color:#1e293b;
    }

    .container{
      max-width:1000px;
      margin:auto;
    }

    .card{
      background:#fff;
      border-radius:20px;
      padding:25px;
      box-shadow:0 4px 20px rgba(0,0,0,.08);
    }

    h1{
      color:#2563eb;
      text-align:center;
      margin-top:0;
    }

    .subtitle{
      text-align:center;
      color:#64748b;
      line-height:1.8;
      margin-bottom:25px;
    }

    .upload-box{
      border:2px dashed #93c5fd;
      border-radius:16px;
      padding:30px;
      text-align:center;
      cursor:pointer;
      background:#eff6ff;
      transition:.3s;
    }

    .upload-box:hover{
      background:#dbeafe;
    }

    input[type=file]{
      display:none;
    }

    #preview-container{
      margin-top:25px;
      display:none;
    }

    #image{
      max-width:100%;
      display:block;
    }

    .controls{
      margin-top:20px;
      display:grid;
      gap:15px;
    }

    .row{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
    }

    select,
    input[type=number],
    button{
      padding:14px;
      border-radius:12px;
      border:1px solid #cbd5e1;
      font-size:15px;
    }

    button{
      background:#2563eb;
      color:#fff;
      border:none;
      cursor:pointer;
    }

    button:hover{
      background:#1d4ed8;
    }

    .note{
      color:#64748b;
      font-size:14px;
      text-align:center;
      margin-top:15px;
      line-height:1.8;
    }

    @media (max-width:768px){
      body{
        padding:15px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>قص الصور وتغيير أبعادها</h1>

    <p class="subtitle">
      ارفع صورتك، قصها بسهولة، غيّر أبعادها، ثم نزّلها بالصيغة التي تريدها.
    </p>

    <label class="upload-box" for="fileInput">
      اضغط هنا لاختيار صورة أو اسحبها وأفلتها
    </label>

    <input
      id="fileInput"
      type="file"
      accept="image/*,.heic,.heif"
    >

    <div id="preview-container">

      <img id="image" alt="معاينة الصورة">

      <div class="controls">

        <div class="row">
          <select id="aspectRatio">
            <option value="NaN">قص حر</option>
            <option value="1">1:1</option>
            <option value="1.777777">16:9</option>
            <option value="0.5625">9:16</option>
            <option value="1.333333">4:3</option>
          </select>

          <input type="number" id="width" placeholder="العرض (اختياري)">

          <input type="number" id="height" placeholder="الارتفاع (اختياري)">

          <select id="format">
            <option value="png">PNG</option>
            <option value="jpeg">JPG</option>
            <option value="webp">WEBP</option>
          </select>
        </div>

        <button id="downloadBtn">
          قص وتحميل الصورة
        </button>

      </div>

      <p class="note">
        تدعم الأداة معظم صيغ الصور بما فيها صور الآيفون HEIC وHEIF.
      </p>

    </div>

  </div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const image = document.getElementById("image");
const previewContainer = document.getElementById("preview-container");
const aspectRatio = document.getElementById("aspectRatio");
const downloadBtn = document.getElementById("downloadBtn");
const widthInput = document.getElementById("width");
const heightInput = document.getElementById("height");
const formatSelect = document.getElementById("format");

let cropper;

fileInput.addEventListener("change", async (e) => {

  let file = e.target.files[0];

  if (!file) return;

  try {

    if (
      file.type === "image/heic" ||
      file.type === "image/heif" ||
      file.name.toLowerCase().endsWith(".heic") ||
      file.name.toLowerCase().endsWith(".heif")
    ) {

      const convertedBlob = await heic2any({
        blob: file,
        toType: "image/jpeg",
        quality: 0.9
      });

      file = new File(
        [convertedBlob],
        file.name.replace(/\.(heic|heif)$/i, ".jpg"),
        { type: "image/jpeg" }
      );
    }

    const imageURL = URL.createObjectURL(file);

    image.src = imageURL;

    previewContainer.style.display = "block";

    image.onload = () => {

      if (cropper) {
        cropper.destroy();
      }

      cropper = new Cropper(image, {
        viewMode: 1,
        autoCropArea: 1
      });
    };

  } catch (error) {
    alert("تعذر فتح الصورة.");
    console.error(error);
  }
});

aspectRatio.addEventListener("change", () => {

  if (!cropper) return;

  const ratio = aspectRatio.value === "NaN"
    ? NaN
    : parseFloat(aspectRatio.value);

  cropper.setAspectRatio(ratio);
});

downloadBtn.addEventListener("click", () => {

  if (!cropper) return;

  const width = parseInt(widthInput.value) || undefined;
  const height = parseInt(heightInput.value) || undefined;

  const canvas = cropper.getCroppedCanvas({
    width,
    height,
    imageSmoothingQuality: "high"
  });

  const format = formatSelect.value;
  const mimeType = "image/" + format;

  canvas.toBlob((blob) => {

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download = "webbag-image." + (format === "jpeg" ? "jpg" : format);

    link.click();

  }, mimeType, 0.95);
});
</script>

</body>
  </html>
